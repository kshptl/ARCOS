# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    paths:
      - "pipeline/**"
      - "web/**"
      - ".github/workflows/ci.yml"
      - "Makefile"
  push:
    branches: [main]
    paths:
      - "pipeline/**"
      - "web/**"
      - ".github/workflows/ci.yml"
      - "Makefile"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    name: pipeline (lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python 3.12
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pipeline/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Test
        env:
          OPENARCOS_ENV: ci
        run: uv run pytest -q --cov=openarcos_pipeline --cov-report=term-missing

  schema-gate:
    name: schema gate (web/public/data)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python 3.12
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pipeline/uv.lock"

      - name: Install pipeline deps (for jsonschema + polars)
        working-directory: pipeline
        run: uv sync --frozen --extra dev

      - name: Check for data files
        id: data
        run: |
          if compgen -G "web/public/data/*.json" > /dev/null || compgen -G "web/public/data/*.parquet" > /dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate emitted data against schemas
        if: steps.data.outputs.present == 'true'
        working-directory: pipeline
        run: uv run python scripts/validate_web_data.py

  web:
    name: web (lint + typecheck + test + e2e + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run validate-data
      - run: pnpm run build-ranks
      - run: pnpm run build-similar
      - run: pnpm run build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run e2e

  lighthouse:
    name: lighthouse
    needs: [web]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build-ranks
      - run: pnpm run build-similar
      - run: pnpm run build
      - run: pnpm exec lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
